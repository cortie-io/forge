server {
    listen 80;
    listen [::]:80;
    server_name passio.cortie.io www.passio.cortie.io;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://passio.cortie.io$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name passio.cortie.io www.passio.cortie.io;

    root /var/www/sikdorak;
    index pages/index.html;

    ssl_certificate /etc/letsencrypt/live/passio.cortie.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/passio.cortie.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 구식 JS POST /api/rag/jobs → Node rag2 (캐시된 ai-explain 대응)
    location = /api/rag/jobs {
        proxy_pass http://127.0.0.1:3100/api/rag2/jobs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # job 상세 폴링·히스토리는 Node DB (Python /api/rag/ 보다 먼저)
    location ^~ /api/rag/jobs/ {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location = /api/rag/history {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location /api/rag/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 10s;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }

    location /api/admin/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location = / {
        return 302 /pages/index.html;
    }

    location = /index.html {
        return 302 /pages/index.html;
    }

    location = /login.html {
        return 302 /pages/login.html;
    }

    location = /signup.html {
        return 302 /pages/signup.html;
    }

    location = /dashboard.html {
        return 302 /pages/dashboard.html;
    }

    location = /history.html {
        return 302 /pages/history.html;
    }

    location = /admin {
        return 302 /pages/admin.html;
    }

    location = /admin.html {
        return 302 /pages/admin.html;
    }

    location = /assets/js/quiz-session-page.js {
        rewrite ^ /assets/js/quiz-session.js last;
    }

    location ~* \.(?:css|js|mjs)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        try_files $uri =404;
    }

    location ~* \.json$ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
