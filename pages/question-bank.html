<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<title>Passio — 문제 은행</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/lora@5/600.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/outfit@5/400.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/outfit@5/500.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/outfit@5/600.css">
<link rel="stylesheet" href="/assets/css/passai.css?v=20260416d">
</head>
<body>
<div class="page">
  <header class="nav">
    <div class="nav-left">
      <a class="nav-logo" href="/pages/index.html" aria-label="홈으로 이동">
        <span class="logo-mark" aria-hidden="true"><svg viewBox="0 0 15 15"><path d="M7.5 1.5l2 4 4.4.6-3.2 3.1.8 4.4-4-2.1-4 2.1.8-4.4-3.2-3.1 4.4-.6z"/></svg></span>
        <span class="nav-brand-name">Passio</span>
      </a>
      <nav class="nav-menu" aria-label="페이지 이동">
        <a class="nav-link" href="/pages/dashboard.html">대시보드</a>
        <a class="nav-link" href="/pages/ai-explain.html">AI 해설</a>
        <a class="nav-link active" href="/pages/question-bank.html">문제은행</a>
        <a class="nav-link" href="/pages/history.html">히스토리</a>
        <a class="nav-link" href="/pages/api-token.html">API 토큰</a>
      </nav>
    </div>
    <div class="nav-r">
      <span class="nav-user" id="ava-bank">학습자</span>
      <button class="btn btn-out btn-sm" id="btn-logout">로그아웃</button>
    </div>
  </header>

  <main class="container section question-bank-layout">
    <section class="dash-headline">
      <span class="dash-pill">Question Bank</span>
      <h2><span id="user-name">학습자</span>님의 문제 은행</h2>
      <p class="sub">자격증을 먼저 고르고 세부 과목으로 좁힌 뒤, 문제 목록에서 원하는 문항을 선택해 바로 풀 수 있습니다.</p>
    </section>

    <section class="card panel bank-filter-panel">
      <div class="bank-filter-row">
        <div class="field" style="margin-bottom:0;min-width:220px;">
          <label for="certificate-filter">자격증 선택</label>
          <select id="certificate-filter" class="bank-select">
            <option value="">전체 자격증</option>
          </select>
        </div>
        <div class="field" style="margin-bottom:0;min-width:220px;">
          <label for="subject-filter">세부 과목 선택</label>
          <select id="subject-filter" class="bank-select">
            <option value="">전체 세부 과목</option>
          </select>
        </div>
        <div class="bank-meta" id="bank-meta">로딩 중...</div>
      </div>
    </section>

    <section id="bank-list" class="bank-list"></section>

    <section class="bank-pagination" id="bank-pagination" style="display:none;">
      <button class="btn btn-out btn-sm" id="btn-prev">이전</button>
      <span class="bank-page-indicator" id="page-indicator">1 / 1</span>
      <button class="btn btn-out btn-sm" id="btn-next">다음</button>
    </section>
  </main>
</div>
<script src="/assets/js/question-bank-page.js?v=20260416f"></script>
</body>
</html>
