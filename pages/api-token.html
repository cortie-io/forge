<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<title>Passio — API 토큰</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/lora@5/600.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/outfit@5/400.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/outfit@5/500.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/outfit@5/600.css">
<link rel="stylesheet" href="/assets/css/passai.css?v=20260416g">
</head>
<body>
<div class="page">
  <header class="nav">
    <div class="nav-left">
      <a class="nav-logo" href="/pages/index.html" aria-label="홈으로 이동">
        <span class="logo-mark" aria-hidden="true"><svg viewBox="0 0 15 15"><path d="M7.5 1.5l2 4 4.4.6-3.2 3.1.8 4.4-4-2.1-4 2.1.8-4.4-3.2-3.1 4.4-.6z"/></svg></span>
        <span class="nav-brand-name">Passio</span>
      </a>
      <nav class="nav-menu" aria-label="페이지 이동">
        <a class="nav-link" href="/pages/dashboard.html">대시보드</a>
        <a class="nav-link" href="/pages/ai-explain.html">AI 해설</a>
        <a class="nav-link" href="/pages/question-bank.html">문제은행</a>
        <a class="nav-link" href="/pages/history.html">히스토리</a>
        <a class="nav-link active" href="/pages/api-token.html">API 토큰</a>
      </nav>
    </div>
    <div class="nav-r">
      <span class="nav-user" id="ava-token">학습자</span>
      <button class="btn btn-out btn-sm" id="btn-logout">로그아웃</button>
    </div>
  </header>

  <main class="container section token-layout">
    <section class="dash-headline">
      <span class="dash-pill">API Access</span>
      <h2><span id="user-name">학습자</span>님의 외부 API 토큰</h2>
      <p class="sub">보안을 위해 비밀번호를 한 번 더 입력하면 토큰을 확인할 수 있습니다. 이 토큰은 30일 동안 유효하며 만료 시 자동으로 새 토큰으로 교체됩니다.</p>
    </section>

    <section class="card panel token-panel">
      <div class="field token-password-field">
        <label for="confirm-password">비밀번호 재입력</label>
        <input id="confirm-password" type="password" autocomplete="current-password" placeholder="계정 비밀번호를 다시 입력하세요">
      </div>
      <div class="token-actions">
        <button class="btn btn-navy" id="btn-reveal" type="button">토큰 조회</button>
        <button class="btn btn-out" id="btn-copy" type="button" disabled>복사</button>
      </div>
      <div class="field token-value-field">
        <label for="token-value">API 토큰</label>
        <textarea id="token-value" class="token-textarea" rows="3" readonly placeholder="토큰 조회 버튼을 눌러 확인하세요."></textarea>
      </div>
      <div class="token-meta" id="token-meta">토큰을 조회하면 만료일이 표시됩니다.</div>
      <div class="msg" id="token-msg"></div>
      <div class="linkline">
        <span>호출 헤더 예시: <span class="kbd">X-API-Token: psk_...</span></span>
      </div>
    </section>
  </main>
</div>
<script src="/assets/js/api-token-page.js?v=20260416g"></script>
</body>
</html>
